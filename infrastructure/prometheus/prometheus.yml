global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:4000"]
    metrics_path: /metrics

  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:4001"]
    metrics_path: /metrics

  - job_name: runtime
    static_configs:
      - targets: ["runtime:4002"]
    metrics_path: /metrics
