name: Deploy

on:
  push:
    branches: [master, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPO_PREFIX: flowforge

jobs:
  build-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service:
          - name: api
            dockerfile: infrastructure/docker/Dockerfile.api
          - name: orchestrator
            dockerfile: infrastructure/docker/Dockerfile.orchestrator
          - name: runtime
            dockerfile: infrastructure/docker/Dockerfile.runtime
          - name: worker
            dockerfile: infrastructure/docker/Dockerfile.worker
          - name: web
            dockerfile: infrastructure/docker/Dockerfile.web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PREFIX }}-${{ matrix.service.name }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PREFIX }}-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/flowforge
            # Pull latest images
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
